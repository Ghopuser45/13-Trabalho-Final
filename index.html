<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Estudos</title>
    <link rel="icon" href="images/icone.png"/>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>📚 Organizador de Estudos</h1>
        <p>Gerencie suas tarefas acadêmicas de forma simples e eficiente.</p>

        <button id="btn-tema">
            🌙 Modo Escuro
        </button>
    </header>

    <main>

        <!-- Formulário de cadastro -->
        <section class="cadastro-tarefa">

            <h2>Nova Tarefa</h2>

            <form id="form-tarefa">

                <div class="campo">
                    <label for="titulo">Título da tarefa</label>
                    <input
                        type="text"
                        id="titulo"
                        placeholder="Ex: Estudar JavaScript"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="disciplina">Disciplina</label>
                    <input
                        type="text"
                        id="disciplina"
                        placeholder="Ex: Desenvolvimento Web"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="descricao">
                        Descrição (opcional)
                    </label>

                    <textarea
                        id="descricao"
                        placeholder="Detalhes da atividade..."
                        rows="4">
                    </textarea>
                </div>

                <div class="campo">
                    <label for="data">Data de entrega</label>
                    <input
                        type="date"
                        id="data"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="prioridade">Prioridade</label>

                    <select id="prioridade" required>
                        <option value="">Selecione</option>
                        <option value="Alta">Alta</option>
                        <option value="Média">Média</option>
                        <option value="Baixa">Baixa</option>
                    </select>
                </div>

                <button type="submit" id="btn-salvar">
                        Adicionar Tarefa
                </button>

                <button
                    type="button"
                    id="btn-cancelar"
                    style="display: none;">
                    Cancelar Edição
                </button>

            </form>

        </section>

        <!-- Dashboard (na verdade ainda não é uma dashboard completa rsrs!) -->
        <section class="dashboard">

            <h2>Progresso</h2>

            <div class="estatisticas">

                <div class="card">
                    <h3>Total</h3>
                    <p id="total-tarefas">0</p>
                </div>

                <div class="card">
                    <h3>Pendentes</h3>
                    <p id="pendentes">0</p>
                </div>

                <div class="card">
                    <h3>Concluídas</h3>
                    <p id="concluidas">0</p>
                </div>

            </div>

            <div class="barra-progresso">

                <div id="progresso"></div>

            </div>

            <p id="percentual">0%</p>

        </section>

        <!-- Filtros -->
        <section class="filtros">

            <h2>Tarefas</h2>

            <button id="btn-todas">
                Todas
            </button>

            <button id="btn-pendentes">
                Pendentes
            </button>

            <button id="btn-concluidas">
                Concluídas
            </button>

        </section>

        <!-- Lista de tarefas -->
        <section>

            <ul id="lista-tarefas">

                <!--
                As tarefas serão inseridas aqui
                pelo JavaScript.
                -->

            </ul>

        </section>

    </main>

    <footer>
        <p>
            Desenvolvido para a disciplina de Desenvolvimento Web I.
        </p>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
